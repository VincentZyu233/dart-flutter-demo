name: Build and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Stage 1: Check commit message
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check commit message
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -qiE "(build action|build publish)"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✓ Commit message contains build trigger"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "✗ Commit message does not contain build trigger"
            echo "   Skipping build (commit: ${GITHUB_SHA:0:7})"
          fi

  # Stage 2: Matrix build (Windows x64, Linux x64, Android APK)
  build:
    needs: check-commit
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            build_cmd: flutter build windows --release
            artifact_name: flutter-showcase-windows-x64
            artifact_path: build/windows/x64/runner/Release/
          - platform: linux
            os: ubuntu-latest
            build_cmd: flutter build linux --release
            artifact_name: flutter-showcase-linux-x64
            artifact_path: build/linux/x64/release/bundle/
          - platform: android
            os: ubuntu-latest
            build_cmd: flutter build apk --release
            artifact_name: flutter-showcase-android
            artifact_path: build/app/outputs/flutter-apk/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-pub || true

      - name: Generate version tag
        id: version
        run: |
          VERSION="${GITHUB_SHA:0:7}-$(date +%Y%m%d-%H%M%S)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Build version: $VERSION"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          flutter build linux --release

      - name: Build (Android APK)
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/windows/x64/runner/Release/
          retention-days: 7

      - name: Upload Linux artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/linux/x64/release/bundle/
          retention-days: 7

      - name: Upload Android artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # Stage 3: Publish release
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Flutter Showcase v${{ needs.build.outputs.version }}
          body: |
            ## Flutter Showcase Build

            **Version:** `${{ needs.build.outputs.version }}`

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows x64 | `flutter-showcase-windows-x64.zip` |
            | Linux x64 | `flutter-showcase-linux-x64.tar.gz` |
            | Android APK | `flutter-showcase-android.apk` |

            ### Build Info
            - Triggered by: `${{ github.event.head_commit.message }}`
            - Commit: `${{ github.sha }}`
          files: |
            artifacts/flutter-showcase-windows-x64/**
            artifacts/flutter-showcase-linux-x64/**
            artifacts/flutter-showcase-android/**
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success notification
        run: |
          echo "✅ Build and release completed!"
          echo "   Version: ${{ needs.build.outputs.version }}"
          echo "   Release: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.build.outputs.version }}"
