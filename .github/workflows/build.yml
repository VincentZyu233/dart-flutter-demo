name: Build and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Stage 1: Check commit message & extract version
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.version.outputs.version }}
      commits_log: ${{ steps.commits.outputs.log }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -qiE "(build action|build release)"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✓ Commit message contains build trigger"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "✗ Commit message does not contain build trigger"
            echo "   Skipping build (commit: ${GITHUB_SHA:0:7})"
          fi

      - name: Extract version from pubspec.yaml
        id: version
        if: steps.check.outputs.should_build == 'true'
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //')
          VERSION="${FULL_VERSION%%+*}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Extracted version: $VERSION (from $FULL_VERSION)"

      - name: Collect commit log
        id: commits
        if: steps.check.outputs.should_build == 'true'
        run: |
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD | tail -1)"
          fi

          {
            echo "log<<EOF"
            git log "$BASE_SHA..$HEAD_SHA" --pretty=format:'- %s (%h) — @%an' --reverse
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  # Stage 2: Matrix build (Windows x64, Linux x64, Android APK, iOS IPA)
  build:
    needs: check-commit
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            artifact_name: dart-flutter-demo-showcase-windows-x64
            artifact_path: build/windows/x64/runner/Release/
          - platform: linux
            os: ubuntu-latest
            artifact_name: dart-flutter-demo-showcase-linux-x64
            artifact_path: build/linux/x64/release/bundle/
          - platform: macos
            os: macos-15-intel
            artifact_name: dart-flutter-demo-showcase-macos-x64
            artifact_path: build/macos/Build/Products/Release/
          - platform: android
            os: ubuntu-latest
            artifact_name: dart-flutter-demo-showcase-android
            artifact_path: build/app/outputs/flutter-apk/
          - platform: ios
            os: macos-latest
            artifact_name: dart-flutter-demo-showcase-ios
            artifact_path: build/ios/ipa/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Generate platform projects
        run: flutter create --project-name dart_flutter_demo --platforms=windows,linux,macos,android,ios .

      - name: Copy platform plugins
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            windows)
              mkdir -p windows/runner/plugins/system_info
              cp plugins/windows/system_info_plugin.cpp windows/runner/plugins/system_info/
              cp plugins/windows/system_info_plugin.h windows/runner/plugins/system_info/
              ;;
            linux)
              mkdir -p linux/runner/plugins/system_info
              cp plugins/linux/system_info_plugin.cc linux/runner/plugins/system_info/
              cp plugins/linux/system_info_plugin.h linux/runner/plugins/system_info/
              ;;
            android)
              mkdir -p android/app/src/main/kotlin/com/example/dart_flutter_demo
              cp plugins/android/SystemInfoPlugin.kt android/app/src/main/kotlin/com/example/dart_flutter_demo/
              ;;
            ios)
              mkdir -p ios/Runner
              cp plugins/ios/SystemInfoPlugin.swift ios/Runner/
              ;;
          esac
          echo "✓ Copied plugins/${{ matrix.platform }} to platform directory"

      - name: Patch Windows runner for SystemInfo plugin
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          python3 -c "
          # Patch runner/CMakeLists.txt: add plugin source, include, and export flags
          with open('windows/runner/CMakeLists.txt', 'r') as f:
              cmake = f.read()
          plugin_src = '  \"runner/plugins/system_info/system_info_plugin.cpp\"'
          include_dir = '  \"\${CMAKE_CURRENT_SOURCE_DIR}/plugins/system_info\"'
          export_flags = 'target_link_options(\${BINARY_NAME} PRIVATE /EXPORT:GetSystemInfoJson /EXPORT:FreeSystemInfoJson)'
          if plugin_src not in cmake:
              cmake = cmake.replace(
                  '\"runner/win32_window.cpp\"',
                  '\"runner/win32_window.cpp\"\n' + plugin_src
              )
          if include_dir not in cmake:
              cmake = cmake.replace(
                  'target_include_directories(\${BINARY_NAME} PRIVATE',
                  'target_include_directories(\${BINARY_NAME} PRIVATE\n' + include_dir
              )
          if export_flags not in cmake:
              cmake = cmake.replace(
                  'target_link_libraries(\${BINARY_NAME} PRIVATE flutter flutter_wrapper_plugin)',
                  'target_link_libraries(\${BINARY_NAME} PRIVATE flutter flutter_wrapper_plugin)\n\n' + export_flags
              )
          with open('windows/runner/CMakeLists.txt', 'w') as f:
              f.write(cmake)
          "

      - name: Patch Android for SystemInfo plugin
        if: matrix.platform == 'android'
        shell: bash
        run: |
          python3 -c "
          kt_path = 'android/app/src/main/kotlin/com/example/dart_flutter_demo/MainActivity.kt'
          with open(kt_path, 'r') as f:
              kt = f.read()
          kt = kt.replace(
              'import io.flutter.embedding.android.FlutterActivity',
              'import com.example.dart_flutter_demo.SystemInfoPlugin\nimport io.flutter.embedding.android.FlutterActivity'
          )
          kt = kt.replace(
              'super.configureFlutterEngine(flutterEngine)',
              'super.configureFlutterEngine(flutterEngine)\n        flutterEngine.plugins.add(SystemInfoPlugin())'
          )
          with open(kt_path, 'w') as f:
              f.write(kt)
          "
          echo "=== Patched MainActivity.kt ===" && cat android/app/src/main/kotlin/com/example/dart_flutter_demo/MainActivity.kt

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-pub || true

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Copy Windows runtime PS1
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p build/windows/x64/runner/Release/plugins/windows
          cp plugins/windows/SystemInfo.ps1 build/windows/x64/runner/Release/plugins/windows/

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          flutter build linux --release

      - name: Build (macOS x64)
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Package macOS DMG
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="dart_flutter_demo"
          APP_PATH="build/macos/Build/Products/Release/${APP_NAME}.app"
          STAGING_DIR="build/macos/dmg-staging"
          DMG_NAME="dart-flutter-demo-showcase-macos-x64"

          test -d "$APP_PATH"

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "Dart + Flutter Demo" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "build/macos/${DMG_NAME}.dmg"

      - name: Build (Android APK)
        if: matrix.platform == 'android'
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Verify Android APK outputs
        if: matrix.platform == 'android'
        shell: bash
        run: |
          echo "=== build/app/outputs/flutter-apk ==="
          ls -lah build/app/outputs/flutter-apk/

          test -f build/app/outputs/flutter-apk/app-release.apk
          test -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          test -f build/app/outputs/flutter-apk/app-x86_64-release.apk

          echo "✓ Android APK outputs verified"

      - name: Patch iOS for SystemInfo plugin
        if: matrix.platform == 'ios'
        shell: bash
        run: |
          # Register plugin in AppDelegate.swift
          python3 -c "
          with open('ios/Runner/AppDelegate.swift', 'r') as f:
              swift = f.read()
          swift = swift.replace(
              'GeneratedPluginRegistrant.register(with: self)',
              'GeneratedPluginRegistrant.register(with: self)\n    SystemInfoPlugin.register(with: self)'
          )
          with open('ios/Runner/AppDelegate.swift', 'w') as f:
              f.write(swift)
          "
          # Override code signing via xcconfig (more reliable than sed on pbxproj)
          cat > ios/Flutter/Release.xcconfig << 'XCEOF'
          #include "Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig"
          #include "Generated.xcconfig"
          CODE_SIGN_IDENTITY=
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGNING_ALLOWED=NO
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          XCEOF
          echo "=== Patched AppDelegate.swift ===" && head -5 ios/Runner/AppDelegate.swift

      - name: Build (iOS IPA - no codesign)
        if: matrix.platform == 'ios'
        run: |
          # Build Flutter app without codesign
          flutter build ios --release --no-codesign
          # Package IPA manually
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/dart-flutter-demo-showcase-ios.ipa Payload
          cd ../..

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/windows/x64/runner/Release/
          retention-days: 7

      - name: Upload Linux artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/linux/x64/release/bundle/
          retention-days: 7

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/macos/dart-flutter-demo-showcase-macos-x64.dmg
          retention-days: 7

      - name: Upload Android artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 7

      - name: Upload iOS artifact
        if: matrix.platform == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/ios/ipa/dart-flutter-demo-showcase-ios.ipa
          retention-days: 7

  # Stage 3: Package & publish release
  publish:
    needs: [check-commit, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts with version
        run: |
          VERSION="${{ needs.check-commit.outputs.version }}"

          # Windows: zip the directory
          cd artifacts/dart-flutter-demo-showcase-windows-x64
          zip -r "../dart-flutter-demo-showcase-windows-x64-v${VERSION}.zip" .
          cd ../..

          # Linux: tar.gz the directory
          cd artifacts/dart-flutter-demo-showcase-linux-x64
          tar -czf "../dart-flutter-demo-showcase-linux-x64-v${VERSION}.tar.gz" .
          cd ../..

          # macOS: keep the DMG produced in the build job
          cp artifacts/dart-flutter-demo-showcase-macos-x64/dart-flutter-demo-showcase-macos-x64.dmg \
             "artifacts/dart-flutter-demo-showcase-macos-x64-v${VERSION}.dmg"

          # Android: rename the APK
          ls -lah artifacts/dart-flutter-demo-showcase-android/
          test -f artifacts/dart-flutter-demo-showcase-android/app-release.apk
          test -f artifacts/dart-flutter-demo-showcase-android/app-arm64-v8a-release.apk
          test -f artifacts/dart-flutter-demo-showcase-android/app-x86_64-release.apk

          cp artifacts/dart-flutter-demo-showcase-android/app-release.apk \
             "artifacts/dart-flutter-demo-showcase-android-universal-v${VERSION}.apk"
          cp artifacts/dart-flutter-demo-showcase-android/app-arm64-v8a-release.apk \
             "artifacts/dart-flutter-demo-showcase-android-arm64-v${VERSION}.apk"
          cp artifacts/dart-flutter-demo-showcase-android/app-x86_64-release.apk \
             "artifacts/dart-flutter-demo-showcase-android-x86_64-v${VERSION}.apk"

          # iOS: rename the IPA
          cp artifacts/dart-flutter-demo-showcase-ios/dart-flutter-demo-showcase-ios.ipa \
             "artifacts/dart-flutter-demo-showcase-ios-v${VERSION}.ipa"

          echo "📦 Packaged artifacts:"
          find artifacts/ -maxdepth 1 -type f

      - name: Render release template
        run: |
          VERSION="${{ needs.check-commit.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"
          BUILD_INFO=$(cat <<EOF
          ### Build Info
          - Commit: \`${{ github.sha }}\`
          - Commit time: \`${{ github.event.head_commit.timestamp }}\`
          EOF
          )
          cat <<'EOF' > commit_log.txt
${{ needs.check-commit.outputs.commits_log }}
EOF

          python3 - "$REPO" "$VERSION" "$BASE_URL" "$BUILD_INFO" commit_log.txt <<'PY'
          import pathlib
          import sys

          repo, version, base_url, build_info, commit_log_path = sys.argv[1:6]
          template = pathlib.Path('.github/release_template.md').read_text(encoding='utf-8')
          commit_log = pathlib.Path(commit_log_path).read_text(encoding='utf-8').strip()
          body = (
              template
              .replace('__REPO__', repo)
              .replace('__VERSION__', version)
              .replace('__BASE_URL__', base_url)
              .replace('__BUILD_INFO__', build_info)
              .replace('__COMMIT_LOG__', commit_log)
          )
          pathlib.Path('release_body.md').write_text(body, encoding='utf-8')
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-commit.outputs.version }}
          name: dart-flutter-demo (proof of concept) v${{ needs.check-commit.outputs.version }}
          body_path: release_body.md
          files: |
            artifacts/dart-flutter-demo-showcase-windows-x64-v*.zip
            artifacts/dart-flutter-demo-showcase-linux-x64-v*.tar.gz
            artifacts/dart-flutter-demo-showcase-macos-x64-v*.dmg
            artifacts/dart-flutter-demo-showcase-android-universal-v*.apk
            artifacts/dart-flutter-demo-showcase-android-arm64-v*.apk
            artifacts/dart-flutter-demo-showcase-android-x86_64-v*.apk
            artifacts/dart-flutter-demo-showcase-ios-v*.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success notification
        run: |
          echo "✅ Build and release completed!"
          echo "   Version: ${{ needs.check-commit.outputs.version }}"
          echo "   Release: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-commit.outputs.version }}"
