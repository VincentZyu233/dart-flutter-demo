name: Build and Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Stage 1: Check commit message & extract version
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check commit message
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -qiE "(build action|build release)"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "✓ Commit message contains build trigger"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "✗ Commit message does not contain build trigger"
            echo "   Skipping build (commit: ${GITHUB_SHA:0:7})"
          fi

      - name: Extract version from pubspec.yaml
        id: version
        if: steps.check.outputs.should_build == 'true'
        run: |
          FULL_VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //')
          VERSION="${FULL_VERSION%%+*}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Extracted version: $VERSION (from $FULL_VERSION)"

  # Stage 2: Matrix build (Windows x64, Linux x64, Android APK)
  build:
    needs: check-commit
    if: needs.check-commit.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            artifact_name: flutter-showcase-windows-x64
            artifact_path: build/windows/x64/runner/Release/
          - platform: linux
            os: ubuntu-latest
            artifact_name: flutter-showcase-linux-x64
            artifact_path: build/linux/x64/release/bundle/
          - platform: android
            os: ubuntu-latest
            artifact_name: flutter-showcase-android
            artifact_path: build/app/outputs/flutter-apk/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Generate platform projects
        run: flutter create --project-name flutter_showcase --platforms=windows,linux,android .

      - name: Patch Windows runner for SystemInfo plugin
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          python3 -c "
          # Patch runner/CMakeLists.txt: add plugin source and include
          with open('windows/runner/CMakeLists.txt', 'r') as f:
              cmake = f.read()
          cmake = cmake.replace(
              '\"runner/win32_window.cpp\"',
              '\"runner/win32_window.cpp\"\n  \"runner/plugins/system_info/system_info_plugin.cpp\"'
          )
          cmake = cmake.replace(
              'target_include_directories(\${BINARY_NAME} PRIVATE',
              'target_include_directories(\${BINARY_NAME} PRIVATE\n  \"\${CMAKE_CURRENT_SOURCE_DIR}/plugins/system_info\"'
          )
          with open('windows/runner/CMakeLists.txt', 'w') as f:
              f.write(cmake)
          "

      - name: Patch Android for SystemInfo plugin
        if: matrix.platform == 'android'
        shell: bash
        run: |
          python3 -c "
          kt_path = 'android/app/src/main/kotlin/com/example/flutter_showcase/MainActivity.kt'
          with open(kt_path, 'r') as f:
              kt = f.read()
          kt = kt.replace(
              'import io.flutter.embedding.android.FlutterActivity',
              'import com.example.flutter_showcase.SystemInfoPlugin\nimport io.flutter.embedding.android.FlutterActivity'
          )
          kt = kt.replace(
              'super.configureFlutterEngine(flutterEngine)',
              'super.configureFlutterEngine(flutterEngine)\n        flutterEngine.plugins.add(SystemInfoPlugin())'
          )
          with open(kt_path, 'w') as f:
              f.write(kt)
          "
          echo "=== Patched MainActivity.kt ===" && cat android/app/src/main/kotlin/com/example/flutter_showcase/MainActivity.kt

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-pub || true

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          flutter build linux --release

      - name: Build (Android APK)
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/windows/x64/runner/Release/
          retention-days: 7

      - name: Upload Linux artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/linux/x64/release/bundle/
          retention-days: 7

      - name: Upload Android artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # Stage 3: Package & publish release
  publish:
    needs: [check-commit, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts with version
        run: |
          VERSION="${{ needs.check-commit.outputs.version }}"

          # Windows: zip the directory
          cd artifacts/flutter-showcase-windows-x64
          zip -r "../flutter-showcase-windows-x64-v${VERSION}.zip" .
          cd ../..

          # Linux: tar.gz the directory
          cd artifacts/flutter-showcase-linux-x64
          tar -czf "../flutter-showcase-linux-x64-v${VERSION}.tar.gz" .
          cd ../..

          # Android: rename the APK
          cp artifacts/flutter-showcase-android/app-release.apk \
             "artifacts/flutter-showcase-android-v${VERSION}.apk"

          echo "📦 Packaged artifacts:"
          find artifacts/ -maxdepth 1 -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-commit.outputs.version }}
          name: Flutter Showcase v${{ needs.check-commit.outputs.version }}
          body: |
            ## Flutter Showcase Build

            **Version:** `${{ needs.check-commit.outputs.version }}`

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows x64 | `flutter-showcase-windows-x64-v${{ needs.check-commit.outputs.version }}.zip` |
            | Linux x64 | `flutter-showcase-linux-x64-v${{ needs.check-commit.outputs.version }}.tar.gz` |
            | Android APK | `flutter-showcase-android-v${{ needs.check-commit.outputs.version }}.apk` |

            ### Build Info
            - Triggered by: `${{ github.event.head_commit.message }}`
            - Commit: `${{ github.sha }}`
          files: |
            artifacts/flutter-showcase-windows-x64-v*.zip
            artifacts/flutter-showcase-linux-x64-v*.tar.gz
            artifacts/flutter-showcase-android-v*.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success notification
        run: |
          echo "✅ Build and release completed!"
          echo "   Version: ${{ needs.check-commit.outputs.version }}"
          echo "   Release: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-commit.outputs.version }}"
