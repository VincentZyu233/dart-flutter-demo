name: dart_flutter_demo
description: A Flutter UI showcase PoC app.
publish_to: 'none'
version: 0.3.6-beta.5+20260513

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  file_selector: ^1.1.0
  google_fonts: ^6.1.0
  flutter_colorpicker: ^1.1.0
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/mahiro-pfp-VincentZyu-square.png
